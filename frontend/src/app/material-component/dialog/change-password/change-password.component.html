<mat-toolbar color="primary">
    <mat-toolbar-row fxLayout="row">
        <span class="title-center">Change Password</span>
    </mat-toolbar-row>
</mat-toolbar>

<mat-dialog-content>
    <form [formGroup]="changePasswordForm">
        <div fxFlex fxLayout="column">

            <mat-form-field appearance="fill" fxFlex>
                <mat-label>Old Password</mat-label>
                <input matInput formControlName="oldPassword" type="password" required>
                <mat-error
                    *ngIf="changePasswordForm.controls.oldPassword.touched && changePasswordForm.controls.oldPassword.invalid">
                    <span *ngIf="changePasswordForm.controls.oldPassword.errors?.required">
                        Old Password is required
                    </span>
                </mat-error>
            </mat-form-field>

            <mat-form-field appearance="fill" fxFlex>
                <mat-label>New Password</mat-label>
                <input matInput formControlName="newPassword" type="password"
                    [type]="showNewPassword ? 'text' : 'password'">
                <button mat-icon-button matSuffix (click)="togglePasswordVisibility('new')" type="button">
                    <mat-icon>{{ showNewPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
                </button>
                <mat-error
                    *ngIf="changePasswordForm.controls.newPassword.touched && changePasswordForm.controls.newPassword.invalid">
                    <span *ngIf="changePasswordForm.controls.newPassword.errors?.required">
                        New Password is required
                    </span>
                </mat-error>
            </mat-form-field>

            <mat-form-field appearance="fill" fxFlex>
                <mat-label>Confirm Password</mat-label>
                <input matInput formControlName="confirmPassword" type="password"
                    [type]="showConfirmPassword ? 'text' : 'password'">
                <button mat-icon-button matSuffix (click)="togglePasswordVisibility('confirm')" type="button">
                    <mat-icon>{{ showConfirmPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
                </button>
                <mat-error
                    *ngIf="changePasswordForm.controls.confirmPassword.touched && changePasswordForm.controls.confirmPassword.invalid">
                    <span *ngIf="changePasswordForm.controls.confirmPassword.errors?.required">
                        Confirm Password is required
                    </span>
                    <span *ngIf="changePasswordForm.controls.confirmPassword.errors?.mismatch">
                        Passwords do not match
                    </span>
                </mat-error>
            </mat-form-field>

            <div fxLayout="row" fxLayoutAlign="center center" fxLayoutGap="15px" style="margin-top: 15px;">
                <button mat-flat-button color="primary" [disabled]="validateSubmit() || !changePasswordForm.valid"
                    (click)="handleChangePasswordSubmit()">Update</button>
                <button mat-flat-button color="primary" (click)="dialogRef.close()">Close</button>
            </div>
            </div>
    </form>
</mat-dialog-content>
